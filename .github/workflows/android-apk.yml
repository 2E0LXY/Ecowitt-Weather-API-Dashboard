name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "static/**"
      - "scripts/**"
      - "package.json"
      - "capacitor.config.json"
      - ".github/workflows/android-apk.yml"

permissions:
  contents: write

jobs:
  build-debug-apk:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - name: Set up Android SDK
        uses: android-actions/setup-android@v4

      - name: Install dependencies
        run: npm install

      - name: Build web assets
        run: npm run build

      - name: Generate Android project
        run: npx cap add android

      - name: Sync Capacitor Android
        run: npx cap sync android

      - name: Add Android permissions
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import re

          manifest = Path("android/app/src/main/AndroidManifest.xml")
          text = manifest.read_text()
          permissions = [
              '<uses-permission android:name="android.permission.INTERNET" />',
              '<uses-permission android:name="android.permission.ACCESS_COARSE_LOCATION" />',
              '<uses-permission android:name="android.permission.ACCESS_FINE_LOCATION" />',
          ]
          insert = "\n".join(f"    {p}" for p in permissions if p not in text)
          if insert:
              text = re.sub(r"(<manifest\b[^>]*>)", r"\1\n" + insert, text, count=1)
              manifest.write_text(text)
          PY

      - name: Build debug APK
        run: |
          chmod +x android/gradlew
          cd android
          ./gradlew assembleDebug --stacktrace

      - name: Upload APK artifact
        uses: actions/upload-artifact@v5
        with:
          name: ecowitt-weather-debug-apk
          path: android/app/build/outputs/apk/debug/app-debug.apk

      - name: Publish APK release asset
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          APK_PATH="android/app/build/outputs/apk/debug/app-debug.apk"
          RELEASE_TAG="android-debug-latest"
          ASSET_NAME="app-debug.apk"
          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release delete "$RELEASE_TAG" --cleanup-tag --yes
          fi
          gh release create "$RELEASE_TAG" "$APK_PATH#$ASSET_NAME" \
            --target "$GITHUB_SHA" \
            --title "Latest Android debug APK" \
            --notes "Debug APK built from commit $GITHUB_SHA on $(date -u +'%Y-%m-%d %H:%M:%S UTC')." \
            --prerelease
